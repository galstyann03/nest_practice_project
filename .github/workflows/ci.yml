name: NestJS CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [20, 22]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_INITDB_DATABASE: ${{ secrets.MONGO_DATABASE }}
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          APP_PORT: 3004
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node-version: [22]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_INITDB_DATABASE: ${{ secrets.MONGO_DATABASE }}
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          APP_PORT: 3004
        run: npm run test:e2e

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nest-practice:test .

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - build
      - e2e
      - docker-build-check
    if: ${{ always() }}

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are missing"
            exit 1
          fi

          LINT_STATUS="${{ needs.lint.result }}"
          TEST_STATUS="${{ needs.test.result }}"
          BUILD_STATUS="${{ needs.build.result }}"
          BRANCH="${{ github.ref_name }}"
          E2E_STATUS="${{ needs.e2e.result }}"
          DOCKER_STATUS="${{ needs.docker-build-check.result }}"
          AUTHOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          PR_ACTION="${{ github.event.action }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"

          if [ "${LINT_STATUS}" = "success" ] && [ "${TEST_STATUS}" = "success" ] && [ "${BUILD_STATUS}" = "success" ] && [ "${E2E_STATUS}" = "success" ] && [ "${DOCKER_STATUS}" = "success" ]; then
            STATUS_LABEL="PASSED"
          else
            STATUS_LABEL="FAILED"
          fi

          if [ "${LINT_STATUS}" = "success" ]; then
            LINT_LABEL="PASSED"
          elif [ "${LINT_STATUS}" = "failure" ]; then
            LINT_LABEL="FAILED"
          else
            LINT_LABEL="${LINT_STATUS}"
          fi

          if [ "${TEST_STATUS}" = "success" ]; then
            TEST_LABEL="PASSED"
          elif [ "${TEST_STATUS}" = "failure" ]; then
            TEST_LABEL="FAILED"
          else
            TEST_LABEL="${TEST_STATUS}"
          fi

          if [ "${BUILD_STATUS}" = "success" ]; then
            BUILD_LABEL="PASSED"
          elif [ "${BUILD_STATUS}" = "failure" ]; then
            BUILD_LABEL="FAILED"
          else
            BUILD_LABEL="${BUILD_STATUS}"
          fi

          if [ "${E2E_STATUS}" = "success" ]; then
            E2E_LABEL="PASSED"
          elif [ "${E2E_STATUS}" = "failure" ]; then
            E2E_LABEL="FAILED"
          else
            E2E_LABEL="${E2E_STATUS}"
          fi

          if [ "${DOCKER_STATUS}" = "success" ]; then
            DOCKER_LABEL="PASSED"
          elif [ "${DOCKER_STATUS}" = "failure" ]; then
            DOCKER_LABEL="FAILED"
          else
            DOCKER_LABEL="${DOCKER_STATUS}"
          fi


          if [ "${EVENT}" = "pull_request" ]; then
            MESSAGE_TEXT="${{ github.event.pull_request.title }}"
          else
            MESSAGE_TEXT="${{ github.event.head_commit.message }}"
          fi

          if [ "${EVENT}" = "pull_request" ]; then
            MESSAGE=$(printf "NestJS CI %s\nRepository: %s\nAuthor: %s\nEvent: %s\nPR Action: %s\nLint: %s\nTest: %s\nBuild: %s\nE2E: %s\nDocker: %s\nPR: #%s\nTitle: %s\nFrom: %s\nTo: %s\nPR URL: %s\nRun: %s" \
              "${STATUS_LABEL}" \
              "${{ github.repository }}" \
              "${AUTHOR}" \
              "${EVENT}" \
              "${PR_ACTION}" \
              "${LINT_LABEL}" \
              "${TEST_LABEL}" \
              "${BUILD_LABEL}" \
              "${E2E_LABEL}" \
              "${DOCKER_LABEL}" \
              "${PR_NUMBER}" \
              "${MESSAGE_TEXT}" \
              "${PR_SOURCE_BRANCH}" \
              "${PR_TARGET_BRANCH}" \
              "${PR_URL}" \
              "${RUN_URL}")
          else
            MESSAGE=$(printf "NestJS CI %s\nRepository: %s\nBranch: %s\nAuthor: %s\nEvent: %s\nLint: %s\nTest: %s\nBuild: %s\nE2E: %s\nDocker: %s\nMessage: %s\nRun: %s" \
              "${STATUS_LABEL}" \
              "${{ github.repository }}" \
              "${BRANCH}" \
              "${AUTHOR}" \
              "${EVENT}" \
              "${LINT_LABEL}" \
              "${TEST_LABEL}" \
              "${BUILD_LABEL}" \
              "${E2E_LABEL}" \
              "${DOCKER_LABEL}" \
              "${MESSAGE_TEXT}" \
              "${RUN_URL}")
          fi

          curl --fail-with-body -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
