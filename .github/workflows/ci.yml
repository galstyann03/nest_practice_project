name: NestJS CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: 
      - lint
      - test-and-build
    if: ${{ always() }}

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets are missing"
            exit 1
          fi

          LINT_STATUS="${{ needs.lint.result }}"
          TEST_BUILD_STATUS="${{ needs.test-and-build.result }}"
          BRANCH="${{ github.ref_name }}"
          AUTHOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${LINT_STATUS}" = "success" ] && [ "${TEST_BUILD_STATUS}" = "success" ]; then
            STATUS_LABEL="PASSED"
          else
            STATUS_LABEL="FAILED"
          fi

          if [ "${EVENT}" = "pull_request" ]; then
            MESSAGE_TEXT="${{ github.event.pull_request.title }}"
          else
            MESSAGE_TEXT="${{ github.event.head_commit.message }}"
          fi

          MESSAGE=$(printf "NestJS CI %s\nRepository: %s\nBranch: %s\nAuthor: %s\nEvent: %s\nLint: %s\nTest/Build: %s\nMessage: %s\nRun: %s" \
            "${STATUS_LABEL}" \
            "${{ github.repository }}" \
            "${BRANCH}" \
            "${AUTHOR}" \
            "${EVENT}" \
            "${LINT_STATUS}" \
            "${TEST_BUILD_STATUS}" \
            "${MESSAGE_TEXT}" \
            "${RUN_URL}")

          curl --fail-with-body -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
